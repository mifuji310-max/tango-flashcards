<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#15342E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>暗記シート単語帳</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --desk:#15342E;--desk-2:#0F2721;--paper:#FBF6EC;--ink:#20281F;--muted:#6B6257;
    --line:#E4DCCB;--aka:#E0384A;--gold:#EBC24A;--grow:#4E9E7A;
    --shadow:0 10px 30px -12px rgba(0,0,0,.45);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{background:var(--desk);color:var(--paper);font-family:"Outfit","Hiragino Kaku Gothic ProN","Hiragino Sans",system-ui,sans-serif;-webkit-font-smoothing:antialiased;overscroll-behavior:none;display:flex;justify-content:center;}
  .app{width:100%;max-width:460px;min-height:100dvh;display:flex;flex-direction:column;padding:calc(env(safe-area-inset-top) + 14px) 18px calc(env(safe-area-inset-bottom) + 14px);position:relative;}
  header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .brand{display:flex;align-items:center;gap:10px;font-weight:600;letter-spacing:.02em;}
  .brand .chip{width:26px;height:20px;border-radius:4px;background:var(--aka);box-shadow:inset 0 0 0 2px rgba(255,255,255,.25);}
  .streak{font-size:14px;color:var(--gold);font-weight:600;display:flex;align-items:center;gap:5px;}
  .screen{flex:1;display:none;flex-direction:column;animation:rise .28s ease;}
  .screen.on{display:flex;}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  h1{font-family:"Newsreader",serif;font-weight:500;font-size:25px;margin:2px 0 2px;letter-spacing:.01em;}
  .sub{color:#B9C7BF;font-size:13px;margin:0 0 14px;line-height:1.5;}
  button{font-family:inherit;cursor:pointer;border:none;}
  .ring-wrap{display:flex;align-items:center;gap:18px;background:var(--desk-2);border-radius:18px;padding:16px;margin-bottom:14px;}
  .ring{position:relative;width:88px;height:88px;flex:none;}
  .ring svg{transform:rotate(-90deg);}
  .ring .pct{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .ring .pct b{font-size:22px;font-family:"Newsreader",serif;font-weight:600;}
  .ring .pct span{font-size:9px;color:#9fb1a8;letter-spacing:.08em;}
  .stat-lines{font-size:13px;color:#c7d3cc;line-height:1.8;}
  .stat-lines b{color:var(--paper);font-weight:600;}
  .dot{display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:6px;vertical-align:middle;}
  .flabel{font-size:11px;color:#8ba296;letter-spacing:.08em;font-weight:600;margin:2px 0 7px;}
  .levelbar{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;scrollbar-width:none;}
  .levelbar::-webkit-scrollbar{display:none;}
  .lvchip{flex:none;padding:8px 13px;border-radius:20px;background:var(--desk-2);color:#9fb1a8;font-size:13px;font-weight:600;white-space:nowrap;}
  .lvchip .n{font-size:10px;opacity:.7;margin-left:3px;}
  .lvchip.sel{background:var(--gold);color:#402f00;}
  .seg{display:flex;background:var(--desk-2);border-radius:12px;padding:4px;gap:4px;margin-bottom:14px;}
  .seg button{flex:1;padding:9px 0;border-radius:9px;background:transparent;color:#9fb1a8;font-size:14px;font-weight:600;}
  .seg button.sel{background:var(--paper);color:var(--ink);}
  .start-grid{display:grid;gap:11px;margin-top:auto;}
  .big-btn{padding:16px 18px;border-radius:16px;text-align:left;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow);}
  .big-btn .ic{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:19px;flex:none;}
  .big-btn .tx{display:flex;flex-direction:column;}
  .big-btn .tx b{font-size:16px;}
  .big-btn .tx small{font-size:12px;opacity:.75;font-weight:400;}
  .big-btn.card{background:var(--paper);color:var(--ink);}
  .big-btn.card .ic{background:var(--aka);color:#fff;}
  .big-btn.quiz{background:var(--gold);color:#402f00;}
  .big-btn.quiz .ic{background:#402f00;color:var(--gold);}
  .big-btn.list{background:transparent;color:var(--paper);box-shadow:inset 0 0 0 1.5px rgba(255,255,255,.18);}
  .big-btn.list .ic{background:rgba(255,255,255,.1);}
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:12px;}
  .back{background:none;color:var(--paper);font-size:15px;font-weight:600;padding:6px 2px;opacity:.85;}
  .progress-track{flex:1;height:7px;border-radius:5px;background:var(--desk-2);overflow:hidden;}
  .progress-fill{height:100%;width:0;background:var(--gold);transition:width .3s ease;}
  .count{font-size:13px;color:#9fb1a8;font-variant-numeric:tabular-nums;flex:none;}
  .fc-stage{flex:1;display:flex;flex-direction:column;justify-content:center;}
  .word-card{background:var(--paper);color:var(--ink);border-radius:22px;padding:30px 24px;box-shadow:var(--shadow);position:relative;overflow:hidden;min-height:300px;display:flex;flex-direction:column;}
  .badges{display:flex;gap:7px;align-self:flex-start;}
  .tag{font-size:11px;font-weight:700;letter-spacing:.06em;color:var(--muted);background:#efe7d6;padding:4px 9px;border-radius:6px;}
  .tag.lv{background:var(--aka);color:#fff;}
  .card .pos{color:var(--muted);font-size:13px;margin-top:auto;}
  .headword{font-family:"Newsreader",serif;font-weight:500;font-size:38px;line-height:1.15;margin:18px 0 6px;word-break:break-word;}
  .headword.idiom{font-size:29px;}
  .meaning-zone{position:relative;margin:14px 0 20px;min-height:64px;display:flex;align-items:center;}
  .meaning{font-size:20px;font-weight:600;line-height:1.5;color:var(--ink);}
  .mrow{display:flex;align-items:baseline;gap:8px;font-size:20px;font-weight:600;line-height:1.4;color:var(--ink);}
  .mrow+.mrow{margin-top:4px;}
  .posb{font-size:11px;font-weight:700;color:var(--muted);background:#efe7d6;padding:2px 7px;border-radius:5px;flex:none;}
  .sheet{position:absolute;inset:-6px -8px;border-radius:0;background:linear-gradient(180deg,#e94b5b,#d5303f);box-shadow:inset 0 0 0 2px rgba(255,255,255,.25), inset 0 8px 20px rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:600;letter-spacing:.04em;transition:opacity .32s ease, transform .32s ease;cursor:pointer;}
  .sheet::after{content:"タップで意味を出す";}
  .meaning-zone.revealed .sheet{opacity:0;transform:translateX(18px);pointer-events:none;}
  .grade{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px;}
  .grade button{padding:16px 0;border-radius:14px;font-size:15px;font-weight:700;}
  .grade .again{background:rgba(224,56,74,.12);color:var(--aka);box-shadow:inset 0 0 0 1.5px rgba(224,56,74,.35);}
  .grade .got{background:var(--grow);color:#fff;}
  .grade.hidden{visibility:hidden;}
  .hint{text-align:center;color:#9fb1a8;font-size:12.5px;margin-top:14px;height:16px;}
  .q-stage{flex:1;display:flex;flex-direction:column;}
  .q-card{background:var(--paper);color:var(--ink);border-radius:20px;padding:26px 22px;box-shadow:var(--shadow);text-align:center;margin-bottom:16px;position:relative;}
  .q-card .badges{position:absolute;top:14px;left:14px;}
  .q-word{font-family:"Newsreader",serif;font-weight:500;font-size:33px;margin:20px 0 2px;word-break:break-word;}
  .q-word.idiom{font-size:25px;}
  .q-prompt{color:var(--muted);font-size:13px;}
  .options{display:grid;gap:10px;}
  .opt{padding:15px 18px;border-radius:14px;background:var(--desk-2);color:var(--paper);font-size:16px;font-weight:500;text-align:left;box-shadow:inset 0 0 0 1px rgba(255,255,255,.06);transition:transform .1s ease;display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .opt:active{transform:scale(.99);}
  .opt::after{content:'';font-size:18px;font-weight:700;line-height:1;}
  .opt.correct{background:var(--grow);color:#fff;box-shadow:none;}
  .opt.correct::after{content:'○';}
  .opt.wrong{background:rgba(224,56,74,.18);color:#ffd2d7;box-shadow:inset 0 0 0 1.5px var(--aka);}
  .opt.wrong::after{content:'✕';color:var(--aka);}
  .opt:disabled{cursor:default;}
  .list-tools{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:10px;}
  .toggle{display:flex;align-items:center;gap:8px;font-size:13px;color:#c7d3cc;}
  .switch{width:44px;height:26px;border-radius:20px;background:var(--desk-2);position:relative;transition:background .2s;flex:none;}
  .switch.on{background:var(--aka);}
  .switch i{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:left .2s;}
  .switch.on i{left:21px;}
  .rows{overflow-y:auto;flex:1;border-radius:16px;background:var(--desk-2);padding:6px;}
  .row{display:flex;align-items:center;gap:10px;padding:11px 10px;border-radius:10px;}
  .row+.row{border-top:1px solid rgba(255,255,255,.05);}
  .row .en{font-family:"Newsreader",serif;font-size:16px;font-weight:500;flex:none;min-width:32%;}
  .row .ja{font-size:13.5px;color:#d7e0da;flex:1;transition:color .2s, background .2s;border-radius:5px;padding:2px 6px;}
  .row .ja .alt{opacity:.68;font-size:12px;margin-left:4px;}
  .rows.hide .row .ja{color:transparent;background:var(--aka);}
  .row .lvb{font-size:9px;color:#402f00;background:var(--gold);border-radius:4px;padding:2px 5px;flex:none;font-weight:700;}
  .done{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:6px;}
  .done .mark{font-size:54px;}
  .done h2{font-family:"Newsreader",serif;font-weight:600;font-size:30px;margin:6px 0 2px;}
  .done p{color:#c7d3cc;font-size:14px;margin:0 0 22px;line-height:1.6;}
  .done .again-btn{background:var(--paper);color:var(--ink);padding:15px 34px;border-radius:14px;font-weight:700;font-size:15px;}
  .done .home-btn{background:transparent;color:#c7d3cc;padding:12px;font-weight:600;font-size:14px;margin-top:4px;}
  .empty{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;color:#9fb1a8;font-size:14px;padding:40px;line-height:1.7;}
  .note{font-size:11px;color:#7d8c84;text-align:center;margin-top:10px;line-height:1.5;}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="brand"><span class="chip"></span>暗記シート単語帳</div>
    <div class="streak" id="streak">🔥 <span id="streakN">0</span>日</div>
  </header>

  <section class="screen on" id="home">
    <h1>今日の暗記</h1>
    <p class="sub">レベルを選んで、赤シートで仕分け。<br>あやふやな語ほど何度も出てきます。</p>
    <div class="ring-wrap">
      <div class="ring">
        <svg width="88" height="88" viewBox="0 0 96 96">
          <circle cx="48" cy="48" r="42" fill="none" stroke="#0c2019" stroke-width="9"/>
          <circle id="ringFill" cx="48" cy="48" r="42" fill="none" stroke="var(--gold)" stroke-width="9" stroke-linecap="round" stroke-dasharray="264" stroke-dashoffset="264"/>
        </svg>
        <div class="pct"><b id="ringPct">0%</b><span>MASTERED</span></div>
      </div>
      <div class="stat-lines">
        <div><span class="dot" style="background:var(--grow)"></span><b id="stMaster">0</b> 語 定着</div>
        <div><span class="dot" style="background:var(--gold)"></span><b id="stLearn">0</b> 語 学習中</div>
        <div><span class="dot" style="background:#3a4a42"></span><b id="stNew">0</b> 語 未学習</div>
      </div>
    </div>
    <div class="flabel">レベル（英検）</div>
    <div class="levelbar" id="levelbar"></div>
    <div class="seg" id="scopeSeg">
      <button data-scope="all" class="sel">すべて</button>
      <button data-scope="word">単語</button>
      <button data-scope="idiom">熟語</button>
    </div>
    <div class="start-grid">
      <button class="big-btn card" data-go="flash"><span class="ic">🟥</span><span class="tx"><b>フラッシュカード</b><small>赤シートで隠して仕分け</small></span></button>
      <button class="big-btn quiz" data-go="quiz"><span class="ic">✎</span><span class="tx"><b>4択クイズ</b><small>意味をすばやく選ぶ</small></span></button>
      <button class="big-btn list" data-go="list"><span class="ic">☰</span><span class="tx"><b>単語帳を見る</b><small>一覧・赤シートで確認</small></span></button>
    </div>
    <p class="note" id="homeNote"></p>
  </section>

  <section class="screen" id="flash">
    <div class="topbar"><button class="back" data-go="home">‹ 戻る</button><div class="progress-track"><div class="progress-fill" id="fcFill"></div></div><div class="count" id="fcCount">0/0</div></div>
    <div class="fc-stage" id="fcStage">
      <div class="word-card">
        <div class="badges"><span class="tag lv" id="fcLv">2級</span><span class="tag" id="fcTag">単語</span></div>
        <div class="headword" id="fcWord">—</div>
        <div class="meaning-zone" id="fcZone"><div class="meaning" id="fcMean">—</div><div class="sheet" id="fcSheet"></div></div>
        <div class="pos" id="fcPos"></div>
      </div>
      <div class="grade hidden" id="fcGrade"><button class="again" data-grade="again">あやふや</button><button class="got" data-grade="got">覚えた</button></div>
      <div class="hint" id="fcHint">タップして意味を確認</div>
    </div>
  </section>

  <section class="screen" id="quiz">
    <div class="topbar"><button class="back" data-go="home">‹ 戻る</button><div class="progress-track"><div class="progress-fill" id="qFill"></div></div><div class="count" id="qCount">0/0</div></div>
    <div class="q-stage" id="qStage">
      <div class="q-card">
        <div class="badges"><span class="tag lv" id="qLv">2級</span><span class="tag" id="qTag">単語</span></div>
        <div class="q-word" id="qWord">—</div>
        <div class="q-prompt">意味はどれ？</div>
      </div>
      <div class="options" id="qOpts"></div>
    </div>
  </section>

  <section class="screen" id="list">
    <div class="topbar"><button class="back" data-go="home">‹ 戻る</button><div class="count" id="listCount"></div></div>
    <div class="levelbar" id="listLevelbar"></div>
    <div class="list-tools"><div class="seg" style="margin:0;flex:1" id="listSeg"><button data-scope="all" class="sel">すべて</button><button data-scope="word">単語</button><button data-scope="idiom">熟語</button></div></div>
    <div class="list-tools"><div class="toggle">赤シートで隠す<div class="switch on" id="listSwitch"><i></i></div></div><div class="count" id="listSub"></div></div>
    <div class="rows hide" id="rows"></div>
  </section>

  <section class="screen" id="done">
    <div class="done"><div class="mark" id="doneMark">🎯</div><h2 id="doneTitle">おつかれさま</h2><p id="doneMsg"></p><button class="again-btn" id="doneAgain">もう一度</button><button class="home-btn" data-go="home">ホームへ</button></div>
  </section>
</div>

function todayStr(){const d=new Date();return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
let streak=store.get('streak',{n:0,last:''});
function bumpStreak(){const t=todayStr();if(streak.last===t)return;const y=new Date(Date.now()-864e5);const ys=y.getFullYear()+'-'+(y.getMonth()+1)+'-'+y.getDate();streak.n=(streak.last===ys)?streak.n+1:1;streak.last=t;store.set('streak',streak);}

const $=s=>document.querySelector(s);const $$=s=>document.querySelectorAll(s);
function show(id){$$('.screen').forEach(s=>s.classList.remove('on'));$('#'+id).classList.add('on');}
function saveBoxes(){store.set('boxes',boxes);}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}
function pool(scope,level){return DATA.filter(d=>(scope==='all'||d.t===scope)&&(level==='all'||d.lv===level));}
function buildQueue(scope,level,limit){const p=pool(scope,level).slice();p.sort((a,b)=>(boxes[a.id]-boxes[b.id])||(Math.random()-.5));return shuffle(p).sort((a,b)=>boxes[a.id]-boxes[b.id]).slice(0,limit);}

/* level chips */
let scope='all',level='all';
function renderLevelbar(el,cur,onPick){el.innerHTML='';LEVELS.forEach(([code,label])=>{const c=DATA.filter(d=>code==='all'||d.lv===code).length;const b=document.createElement('button');b.className='lvchip'+(code===cur?' sel':'');b.innerHTML=label+'<span class="n">'+c+'</span>';b.onclick=()=>onPick(code);el.appendChild(b);});}

/* home */
function renderHome(){
  renderLevelbar($('#levelbar'),level,c=>{level=c;renderHome();});
  const p=pool(scope,level);
  const master=p.filter(d=>boxes[d.id]>=4).length;
  const learn=p.filter(d=>boxes[d.id]>=1&&boxes[d.id]<4).length;
  const neu=p.filter(d=>boxes[d.id]===0).length;
  const pct=p.length?Math.round(master/p.length*100):0;
  $('#stMaster').textContent=master;$('#stLearn').textContent=learn;$('#stNew').textContent=neu;
  $('#ringPct').textContent=pct+'%';const C=264;$('#ringFill').style.strokeDashoffset=C-(C*pct/100);
  const wc=DATA.filter(d=>d.t==='word').length,ic=DATA.filter(d=>d.t==='idiom').length;
  $('#homeNote').textContent='全'+DATA.length+'項目（単語 '+wc+'・熟語 '+ic+'）／選択中: '+(level==='all'?'全レベル':LVLABEL[level])+' '+p.length+'項目';
  $('#streakN').textContent=streak.n;
}
$('#scopeSeg').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;scope=b.dataset.scope;$$('#scopeSeg button').forEach(x=>x.classList.toggle('sel',x===b));renderHome();});

document.body.addEventListener('click',e=>{const g=e.target.closest('[data-go]');if(!g)return;const dst=g.dataset.go;if(dst==='flash')startFlash();else if(dst==='quiz')startQuiz();else if(dst==='list'){listScope=scope;listLevel=level;renderList();show('list');}else if(dst==='home'){renderHome();show('home');}});

/* flashcard */
let fcQ=[],fcI=0,fcRevealed=false,fcRight=0;
function startFlash(){fcQ=buildQueue(scope,level,20);fcI=0;fcRight=0;show('flash');if(!fcQ.length){$('#fcStage').innerHTML='<div class="empty">この条件に語がありません。<br>ホームでレベルや種別を変えてください。</div>';return;}renderFC();}
function renderFC(){const d=fcQ[fcI];fcRevealed=false;$('#fcLv').textContent=LVLABEL[d.lv];$('#fcTag').textContent=d.t==='word'?'単語':'熟語';const w=$('#fcWord');w.textContent=d.en;w.classList.toggle('idiom',d.t==='idiom');const meanEl=$('#fcMean');if(d.alt){meanEl.innerHTML='<div class="mrow"><span class="posb">'+d.pos+'</span><span>'+d.ja+'</span></div><div class="mrow"><span class="posb">'+d.alt.pos+'</span><span>'+d.alt.ja+'</span></div>';$('#fcPos').textContent='';}else{meanEl.textContent=d.ja;$('#fcPos').textContent=d.pos==='熟'?'':'（'+d.pos+'）';}$('#fcZone').classList.remove('revealed');$('#fcGrade').classList.add('hidden');$('#fcHint').textContent='タップして意味を確認';$('#fcCount').textContent=(fcI+1)+'/'+fcQ.length;$('#fcFill').style.width=(fcI/fcQ.length*100)+'%';}
$('#fcSheet').addEventListener('click',()=>{fcRevealed=true;$('#fcZone').classList.add('revealed');$('#fcGrade').classList.remove('hidden');$('#fcHint').textContent='思い出せた？';});
$('#fcGrade').addEventListener('click',e=>{const b=e.target.closest('button');if(!b||!fcRevealed)return;const d=fcQ[fcI];if(b.dataset.grade==='got'){boxes[d.id]=Math.min(4,boxes[d.id]+1);fcRight++;}else{boxes[d.id]=Math.max(0,boxes[d.id]-1);}saveBoxes();fcI++;if(fcI>=fcQ.length){bumpStreak();finishFlash();}else renderFC();});
function finishFlash(){$('#doneMark').textContent=fcRight===fcQ.length?'🎉':'📗';$('#doneTitle').textContent='カード完了';$('#doneMsg').innerHTML=fcQ.length+' 枚中 <b>'+fcRight+'</b> 枚「覚えた」<br>あやふやな語は次回また出てきます。';$('#doneAgain').onclick=()=>{renderHome();startFlash();};renderHome();show('done');}

/* quiz */
let qQ=[],qI=0,qRight=0,qLock=false;
function startQuiz(){qQ=buildQueue(scope,level,10);qI=0;qRight=0;show('quiz');if(qQ.length<4){$('#qStage').innerHTML='<div class="empty">クイズには最低4語必要です。<br>レベルや種別を「すべて」に広げてください。</div>';return;}renderQ();}
function renderQ(){qLock=false;const d=qQ[qI];$('#qLv').textContent=LVLABEL[d.lv];$('#qTag').textContent=d.t==='word'?'単語':'熟語';const w=$('#qWord');w.textContent=d.en;w.classList.toggle('idiom',d.t==='idiom');$('#qCount').textContent=(qI+1)+'/'+qQ.length;$('#qFill').style.width=(qI/qQ.length*100)+'%';const same=DATA.filter(x=>x.id!==d.id&&x.t===d.t);const distract=shuffle((same.length>=3?same:DATA.filter(x=>x.id!==d.id))).slice(0,3);const opts=shuffle([d,...distract]);const box=$('#qOpts');box.innerHTML='';opts.forEach(o=>{const btn=document.createElement('button');btn.className='opt';btn.textContent=o.ja;btn.onclick=()=>answer(btn,o,d);box.appendChild(btn);});}
function answer(btn,chosen,correct){if(qLock)return;qLock=true;$$('#qOpts .opt').forEach(b=>{b.disabled=true;if(b.textContent===correct.ja)b.classList.add('correct');});if(chosen.id===correct.id){qRight++;boxes[correct.id]=Math.min(4,boxes[correct.id]+1);}else{btn.classList.add('wrong');boxes[correct.id]=Math.max(0,boxes[correct.id]-1);}saveBoxes();setTimeout(()=>{qI++;if(qI>=qQ.length){bumpStreak();finishQuiz();}else renderQ();},chosen.id===correct.id?650:1150);}
function finishQuiz(){const rate=Math.round(qRight/qQ.length*100);$('#doneMark').textContent=rate===100?'🏆':rate>=70?'🎯':'📘';$('#doneTitle').textContent='クイズ結果';$('#doneMsg').innerHTML=qQ.length+' 問中 <b>'+qRight+'</b> 問正解（'+rate+'%）<br>間違えた語は仕分けに反映しました。';$('#doneAgain').onclick=()=>{renderHome();startQuiz();};renderHome();show('done');}

/* list */
let listScope='all',listLevel='all',listHide=true;
function renderList(){renderLevelbar($('#listLevelbar'),listLevel,c=>{listLevel=c;renderList();});const p=pool(listScope,listLevel);const rows=$('#rows');rows.innerHTML='';p.forEach(d=>{const r=document.createElement('div');r.className='row';const st=boxes[d.id]>=4?'定着':boxes[d.id]>=1?'学習中':'未';r.innerHTML='<span class="en">'+d.en+'</span><span class="ja">'+d.ja+(d.alt?' <span class="alt">／'+d.alt.ja+'</span>':'')+'</span><span class="lvb">'+LVLABEL[d.lv]+'</span>';rows.appendChild(r);});rows.classList.toggle('hide',listHide);$('#listSub').textContent=p.length+' 項目';$('#listCount').textContent=(listLevel==='all'?'単語帳':LVLABEL[listLevel]);$$('#listSeg button').forEach(x=>x.classList.toggle('sel',x.dataset.scope===listScope));}
$('#listSeg').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;listScope=b.dataset.scope;renderList();});
$('#listSwitch').addEventListener('click',()=>{listHide=!listHide;$('#listSwitch').classList.toggle('on',listHide);$('#rows').classList.toggle('hide',listHide);});
$('#rows').addEventListener('click',e=>{const r=e.target.closest('.row');if(!r||!listHide)return;const ja=r.querySelector('.ja');ja.style.color='var(--paper)';ja.style.background='transparent';setTimeout(()=>{if(listHide){ja.style.color='';ja.style.background='';}},1400);});

renderHome();
</script>
</body>
</html>
